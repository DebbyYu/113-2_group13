{% extends "dogpedia/base_generic.html" %}
{% load static %}
{% block title %}Socket.IO聊天室範例{% endblock  %}
{% block extrastatic %}
<link rel="stylesheet" href="{% static "styles/chat.css" %}">
{% endblock  %}

{% block content %}

<!-- 引入Socket.IO客戶端庫 -->
<script src="https://cdn.socket.io/4.4.1/socket.io.min.js"></script>

<div class="top-space">
    <h1>聊天室！</h1>
  </div>

<!-- 聊天室控制區域 -->
<div id="room-controls">
    <input type="text" id="username-input" placeholder="輸入您的暱稱" value="訪客">
    <input type="text" id="room-input" placeholder="聊天室名稱">
    <button id="join-btn">加入聊天室</button>
    <button id="leave-btn">離開聊天室</button>
</div>

<!-- 聊天內容顯示區域 -->
<div id="chat-box"></div>

<!-- 訊息輸入區域 -->
<form id="message-form">
    <input type="text" id="message-input" placeholder="輸入訊息..."
        autocomplete="off">
    <button type="submit">發送</button>
</form>

<script type="text/javascript" src="{% static "scripts/chat.js" %}"></script>

{% endblock %}
