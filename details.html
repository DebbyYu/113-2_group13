<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寵物詳細介紹</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 深色模式開關 -->
    <div class="theme-switch">
        <label for="theme-toggle" class="theme-label">深色模式</label>
        <input type="checkbox" id="theme-toggle">
        <label for="theme-toggle" class="slider"></label>
    </div>

    <!-- 頁首導航列 -->
    <header>
        <h1 id="pet-name">寵物資訊</h1>
        <nav>
            <ul class="tabs">
                <li class="tab-btn active" onclick="showContent('interest')">興趣</li>
                <li class="tab-btn" onclick="showContent('feature')">特色</li>
                <li class="tab-btn" onclick="showContent('care')">飼養須知</li>
            </ul>
        </nav>
    </header>

    <!-- 主要內容 -->
    <div class="details-container">
        <img id="pet-image" src="" alt="寵物">
        <h2 id="pet-name-detail"></h2>

        <div id="interest" class="tab-content active"></div>
        <div id="feature" class="tab-content"></div>
        <div id="care" class="tab-content"></div>
    </div>

    <script>
        // 讀取 localStorage 來確保深色模式可沿用
        function loadTheme() {
            const darkModeEnabled = localStorage.getItem("darkMode") === "enabled";
            if (darkModeEnabled) {
                document.body.classList.add("dark-mode");
                document.getElementById('theme-toggle').checked = true;
            }
        }

        // 切換深色模式
        document.getElementById('theme-toggle').addEventListener('change', function() {
            if (this.checked) {
                document.body.classList.add("dark-mode");
                localStorage.setItem("darkMode", "enabled"); // 記錄深色模式
            } else {
                document.body.classList.remove("dark-mode");
                localStorage.setItem("darkMode", "disabled"); // 記錄淺色模式
            }
        });

        // 頁面載入時應用已儲存的主題設定
        loadTheme();

        // 標籤切換
        function showContent(id) {
            document.querySelectorAll('.tab-content').forEach(div => div.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelector(`[onclick="showContent('${id}')"]`).classList.add('active');
        }

        // 根據網址參數加載對應的內容
        const params = new URLSearchParams(window.location.search);
        const animal = params.get('animal');

        const petData = {
            dog1: { 
                name: "小白", 
                img: "https://imgs.699pic.com/images/600/938/046.jpg!detail.v1", 
                interest: "喜歡戶外活動，尤其是長時間奔跑。對於有大量體力的主人來說，是一個完美的運動夥伴。",
                feature: "毛色純白且蓬鬆，雙眼炯炯有神，活潑好動，對主人非常忠誠。",
                care: "每天至少需要進行 30-60 分鐘的運動，並定期梳理毛髮以保持清潔。"
            },
            cat1: { 
                name: "咪咪", 
                img: "https://cdn.cybassets.com/s/files/26010/ckeditor/pictures/content_aeacea87-af6a-4d93-a0bc-c0d397644bbe.jpg", 
                interest: "喜歡追逐移動的物體，特別是紙球或玩具老鼠。對於互動遊戲十分熱衷。",
                feature: "體型嬌小靈活，反應極快，喜歡與人親近，能迅速適應新環境。",
                care: "建議每天提供適量的互動遊戲，定期修剪指甲，並提供抓板以減少家具損壞。"
            },
            dog2: { 
                name: "大黃", 
                img: "https://imgs.699pic.com/images/600/713/600.jpg!list1x.v2", 
                interest: "最愛水中活動，無論是游泳還是撿回玩具，總是能在水裡玩得很開心。",
                feature: "體格結實，毛色金黃，耐寒耐濕，天生的游泳高手。",
                care: "適合有戶外空間的家庭，應確保狗狗有機會經常接觸水源，並定期檢查耳朵以防感染。"
            },
            cat2: { 
                name: "花花", 
                img: "https://cdn-www.cw.com.tw/article/201810/article-5bd182cf13ebb.jpg", 
                interest: "喜歡找陽光充足的地方曬太陽，並在午後進行悠閒的小睡。",
                feature: "毛色斑斕，個性獨立但親人，喜愛安靜的環境。",
                care: "應確保家中有可供貓咪曬太陽的地方，並提供舒適的睡墊或貓樹以供休息。"
            },
            dog3: { 
                name: "黑黑", 
                img: "https://png.pngtree.com/thumb_back/fh260/background/20210910/pngtree-a-black-dog-watching-the-dog-outdoor-in-the-afternoon-photography-image_838523.jpg", 
                interest: "喜愛啃咬東西，特別是堅硬的骨頭或專門設計的耐咬玩具。",
                feature: "擁有強壯的下顎，警覺性高，常作為護衛犬使用。",
                care: "需提供適當的耐咬玩具，以避免啃咬家具，並確保飲食均衡以維持牙齒健康。"
            },
            cat3: { 
                name: "奶茶", 
                img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRSwghmqnXOm7elulMdNSKYNOAOt3ePpCTVLg&s", 
                interest: "擅長跳躍，喜歡從高處觀察環境，並能輕鬆攀爬到高處。",
                feature: "四肢靈活，身形修長，尾巴長且靈活，對高度非常敏感。",
                care: "應提供多層貓樹或高架設施，以滿足其攀爬需求，並確保窗戶有防護以避免意外墜落。"
            }
        };

        if (animal && petData[animal]) {
            document.getElementById("pet-name").innerText = petData[animal].name;
            document.getElementById("pet-name-detail").innerText = petData[animal].name;
            document.getElementById("pet-image").src = petData[animal].img;
            document.getElementById("interest").innerText = petData[animal].interest;
            document.getElementById("feature").innerText = petData[animal].feature;
            document.getElementById("care").innerText = petData[animal].care;
        }
    </script>
</body>
</html>
